#|___/_/  |_/_/ |_/___/_/  |_/_____/_____/_____//____/
# For all categories, see https://wiki.hyprland.org/Configuring/Variables/

# Set programs that you use
$terminal = ghostty 
$fileManager = thunar
$browser = firefox
$wallpaper = hyprpaper
$notify = mako 
$lock = hyprlock
$bar = waybar
$launcher = wofi

# Execute your favorite apps at launch
exec-once = $bar
exec-once = $wallpaper
exec-once = $notify
exec-once = [workspace 1 silent] $terminal
exec-once = [workspace 2 silent] $browser

#    ____  _________ ____  __    _____  __
#   / __ \/  _/ ___// __ \/ /   /   \ \/ /
#  / / / // / \__ \/ /_/ / /   / /| |\  / 
# / /_/ // / ___/ / ____/ /___/ ___ |/ /  
#/_____/___//____/_/   /_____/_/  |_/_/   
# See https://wiki.hyprland.org/Configuring/Monitors/ name, res@hz, pos, scale

monitor = eDP-1,preferred,auto,1
#workspace = 1, monitor:eDP-1, default:true

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

#    _____   ______  __  ________
#   /  _/ | / / __ \/ / / /_  __/
#   / //  |/ / /_/ / / / / / /   
# _/ // /|  / ____/ /_/ / / /    
#/___/_/ |_/_/    \____/ /_/

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
	touchpad {	
        natural_scroll = true
    }
}


#   _____________   ____________  ___    __ 
#  / ____/ ____/ | / / ____/ __ \/   |  / / 
# / / __/ __/ /  |/ / __/ / /_/ / /| | / /  
#/ /_/ / /___/ /|  / /___/ _, _/ ___ |/ /___
#\____/_____/_/ |_/_____/_/ |_/_/  |_/_____/

general {
  gaps_in=1
  gaps_out=1
  border_size=1
  col.active_border = 0xffBDB18B
  col.inactive_border = rgba(88888888)
  no_border_on_floating = false
  layout = dwindle
}

group {
  col.border_active = 0xff9A76C7
  col.border_inactive = rgba(88888888)

  groupbar {
    col.active = 0xff9A76C7
    col.inactive = rgba(88888888)
    gradients = false
  }
}

#    __  ____________ ______
#   /  |/  /  _/ ___// ____/
#  / /|_/ // / \__ \/ /     
# / /  / // / ___/ / /___   
#/_/  /_/___//____/\____/   

misc {
    mouse_move_enables_dpms=true
    key_press_enables_dpms=true
    disable_hyprland_logo = yes
    disable_splash_rendering = yes
    vrr = 1
}
render {
    direct_scanout = true
}

ecosystem:no_update_news = true

#    ____  ________________  ____  ___  ______________  _   __
#   / __ \/ ____/ ____/ __ \/ __ \/   |/_  __/  _/ __ \/ | / /
#  / / / / __/ / /   / / / / /_/ / /| | / /  / // / / /  |/ / 
# / /_/ / /___/ /___/ /_/ / _, _/ ___ |/ / _/ // /_/ / /|  /  
#/_____/_____/\____/\____/_/ |_/_/  |_/_/ /___/\____/_/ |_/   

decoration {
  rounding = 6

  active_opacity = 1.0
  inactive_opacity = 0.95

blur {
    enabled = true
    size = 12
    #passes = 
    new_optimizations = true
    }
  blurls = gtk-layer-shell
  # blurls = waybar
  blurls = lockscreen
}

animations {
  enabled = true

  bezier = fast , 0.2, 0.9, 0.2, 1

  animation = windows, 1, 0.5, fast
  animation = windowsOut, 1, 0.5, fast
  animation = windowsMove, 1, 0.5, fast
  animation = border, 1, 2, fast
  animation = workspaces, 1, 0.25, fast

}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#executing for more
device:epic mouse V1 {
    #sensitivity = -0.5
}

# _       _______   ______  ____ _       __   ____  __  ____    ___________
#| |     / /  _/ | / / __ \/ __ \ |     / /  / __ \/ / / / /   / ____/ ___/
#| | /| / // //  |/ / / / / / / / | /| / /  / /_/ / / / / /   / __/  \__ \ 
#| |/ |/ // // /|  / /_/ / /_/ /| |/ |/ /  / _, _/ /_/ / /___/ /___ ___/ / 
#|__/|__/___/_/ |_/_____/\____/ |__/|__/  /_/ |_|\____/_____/_____//____/  

# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# rules below would make the specific app transparent

#wlogout
windowrulev2   = fullscreen,class:^(wlogout)$

#helvum
windowrulev2 = float, size 800 300, move 1757 1110,class:^(helvum)$

#firefox
windowrulev2 = opacity 1 1,class:^(firefox)$

#galculator
windowrulev2 = float,size 850 500,class:^(galculator)$

windowrulev2 = float, title:^(File Operation Progress)$


#    __ __ ________  ______  _____   ______  _____
#   / //_// ____/\ \/ / __ )/  _/ | / / __ \/ ___/
#  / ,<  / __/    \  / __  |/ //  |/ / / / /\__ \ 
# / /| |/ /___    / / /_/ // // /|  / /_/ /___/ / 
#/_/ |_/_____/   /_/_____/___/_/ |_/_____//____/  
# See https://wiki.hyprland.org/Configuring/Keywords/ for more
# See https://wiki.hyprland.org/Configuring/Binds/ for more

# Application Binds
bind = SUPER, A, togglefloating
bind = SUPER, B, exec, $browser
bind = SUPER, C, killactive
bind = SUPER, E, exec, $fileManager
bind = SUPER, F, fullscreen
bind = SUPER, G, exec, steam
bind = SUPER, H, exec, systemctl hibernate
bind = SUPER, I, exec, galculator
bind = SUPER, J, togglesplit, # dwindle
bind = SUPER, L, exec, systemctl suspend && sleep 1 && hyprlock
bind = SUPER, M, fullscreen, 1
bind = SUPER, O, exec, obs
bind = SUPER, Q, exec, $terminal
bind = SUPER, R, exec, pkill $bar || true && $bar
bind = SUPER, S, exec, sleep 1 && hyprctl dispatch dpms off
bind = SUPER ALT, S, exec, systemctl suspend
bind = SUPER, V, exec, virt-manager
bind = SUPER, W, exec, obsidian
bind = SUPER, X, exec, pkill $launcher || true && $launcher --show drun
bind = SUPER, escape, exec, wlogout
bind = SUPER SHIFT, escape, exec, $terminal -e btop 
bind = SUPER SHIFT, S, exec, sh -lc 'grim -g "$(slurp)" - | wl-copy -t image/png'
bind = ALT SHIFT, S, exec, sh -lc 'file="$HOME/Media/Screenshots/$(date +%F_%H-%M-%S)_region.png"; grim -g "$(slurp)" "$file"'
bind = SUPER SHIFT, W, exec, sh -lc 'g="$(hyprctl activewindow -j | jq -r "\" + (.at[0]|tostring) + \",\" + (.at[1]|tostring) + \" \" + (.size[0]|tostring) + \"x\" + (.size[1]|tostring)")"; grim -g "$g" - | wl-copy -t image/png'
bind = ALT SHIFT, W, exec, sh -lc 'g="$(hyprctl activewindow -j | jq -r "\" + (.at[0]|tostring) + \",\" + (.at[1]|tostring) + \" \" + (.size[0]|tostring) + \"x\" + (.size[1]|tostring)")"; file="$HOME/Pictures/Screenshots/$(date +%F_%H-%M-%S)_window.png"; grim -g "$g" "$file"'
bind = SUPER SHIFT, X, exec, sh -lc 'grim - | wl-copy -t image/png'
bind = ALT SHIFT, X, exec, sh -lc 'file="$HOME/Pictures/Screenshots/$(date +%F_%H-%M-%S)_full.png"; grim "$file"'

#Vaults
bind = SUPER ALT, V, exec, sudo luks

# Audio controls
bindel =, XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%+
bindel =, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%-
bindl =, XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl =, XF86AudioPlay, exec, playerctl play-pause
bindl =, XF86AudioNext, exec, playerctl next
bindl =, XF86AudioPrev, exec, playerctl previous  
bindel = Alt_R, down, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%-
bindel = Alt_R, up, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%+
bindel = Alt_R, Prior, exec, playerctl play-pause
bindel = Alt_R, right, exec, playerctl next
bindel = Alt_R, left, exec, playerctl previous
bindel = Alt_R, Next, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Move focus with mainMod + arrow keys
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

#hyprlang noerror true
bind = ALT, TAB, hyprexpo:expo, toggle # can be: toggle, off/disable or on/enable

plugin {
    hyprexpo {
        columns = 2
        gap_size = 5
        bg_col = rgb(111111)
        workspace_method = first current # [center/first] [workspace] e.g. first 1 or center m+1


	}
}
#hyprlang noerror false
# Example special workspace (scratchpad)
#bind = SUPER, S, togglespecialworkspace, magic
#bind = SUPER SHIFT, S, movetoworkspace, special:magic

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
